services:
  qa-browser:
    build:
      context: ..
      dockerfile: qa-browser-container/Dockerfile
    container_name: qa_browser
    ports:
      - "8046:8050"
    volumes:
      - ../src/use_cases/secrets:/app/src/use_cases/secrets:ro
      - ../input_files:/app/input_files
    environment:
      QA_BROWSER_JIRA_URL: "https://ncats-nih.atlassian.net"
      QA_BROWSER_JIRA_USER: ""
      QA_BROWSER_JIRA_API_TOKEN: ""
      QA_BROWSER_JIRA_PROJECT_KEY: "ODIN"
      QA_BROWSER_JIRA_ISSUE_TYPE: "Task"
    command:
      - python
      - -m
      - src.qa_browser.app
      - --host
      - "0.0.0.0"
      - -c
      - src/use_cases/secrets/ifxdev_arangodb.yaml
      - -m
      - src/use_cases/secrets/galeradev_write.yaml
      - -m
      - src/use_cases/secrets/pharos_credentials.yaml
      - -s
      - src/use_cases/secrets/ifxdev_minio.yaml
      - --root-path
      - /odin-qa
      - -P
      - src/use_cases/pounce/pounce.yaml
      - -e
      - src/use_cases/secrets/smtp.yaml
      - -f
      - input_files/feedback.json
      - --ramp-diagnosis-file
      - input_files/ramp_id_diagnoses.json
      - --pounce-project-base-url
      - https://pounce-ci.ncats.nih.gov/project
    networks:
      - dashboard_network
    restart: unless-stopped

networks:
  dashboard_network:
    external: true
    name: shared_dashboard_network
