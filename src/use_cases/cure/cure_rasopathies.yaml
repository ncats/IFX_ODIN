  - id: rasopathies_drug_has_adverse_event
    label: "Translator: RAS Drug Has Adverse Event"
    description: One JSONL record per drug-adverse-event phenotype pair, with treatment and patient evidence preserved.
    type: export
    output_format: jsonl
    query_language: aql
    query: |
      FOR drug IN `Drug`
        FOR drug_treatment IN INBOUND drug `DrugTreatmentDrugEdge`
          FOR phenotype, adverse_event_edge IN 1..1 OUTBOUND drug_treatment `DrugTreatmentAdverseEventEdge`
            LET clinical_context = FIRST(
              FOR context IN INBOUND drug_treatment `ClinicalContextDrugTreatmentEdge`
                LIMIT 1
                RETURN context
            )
            LET patient = clinical_context == null ? null : FIRST(
              FOR p IN INBOUND clinical_context `PatientClinicalContextEdge`
                LIMIT 1
                RETURN p
            )
            LET case_report = patient == null ? null : FIRST(
              FOR report IN INBOUND patient `CaseReportPatientEdge`
                LIMIT 1
                RETURN report
            )
            COLLECT
              drug_id = drug.id,
              phenotype_id = phenotype.id
            INTO grouped = {
              drug: drug,
              drug_treatment: drug_treatment,
              adverse_event_edge: adverse_event_edge,
              phenotype: phenotype,
              patient: patient,
              case_report: case_report
            }
            LET drug_doc = FIRST(grouped[*].drug)
            LET phenotype_doc = FIRST(grouped[*].phenotype)
            LET patient_ids = UNIQUE(
              FOR row IN grouped
                FILTER row.patient != null
                RETURN row.patient.id
            )
            LET case_report_ids = UNIQUE(
              FOR row IN grouped
                FILTER row.case_report != null
                RETURN row.case_report.id
            )
            LET outcomes = FLATTEN(
              FOR row IN grouped
                RETURN row.adverse_event_edge.outcomes || []
            )
            LET patient_count = LENGTH(patient_ids)
            LET case_report_count = LENGTH(case_report_ids)
            SORT patient_count DESC, case_report_count DESC, drug_doc.name, phenotype_doc.name
            RETURN {
              drug: {
                id: drug_doc.id,
                xref: drug_doc.xref,
                name: drug_doc.name,
                url: drug_doc.url
              },
              predicate: {
                id: "has_adverse_event",
                label: "has adverse event"
              },
              phenotype: {
                id: phenotype_doc.id,
                xref: phenotype_doc.xref,
                name: phenotype_doc.name
              },
              patient_count: patient_count,
              case_report_count: case_report_count,
              outcomes: outcomes,
              evidence: (
                FOR row IN grouped
                  SORT row.case_report.id, row.drug_treatment.id, row.adverse_event_edge.source_adverse_event_index
                  RETURN {
                    case_report: {
                      id: row.case_report.id,
                      url: row.case_report.case_report_url
                    },
                    adverse_event: {
                      source_label: row.adverse_event_edge.source_label,
                      have_adverse_events: row.adverse_event_edge.have_adverse_events,
                      outcomes: row.adverse_event_edge.outcomes
                    },
                    drug_treatment: {
                      initial_dose_amount: row.drug_treatment.initial_dose_amount,
                      initial_unit_of_measurement: row.drug_treatment.initial_unit_of_measurement,
                      initial_frequency: row.drug_treatment.initial_frequency,
                      initial_route: row.drug_treatment.initial_route,
                      current_dose_amount: row.drug_treatment.current_dose_amount,
                      current_unit_of_measurement: row.drug_treatment.current_unit_of_measurement,
                      current_frequency: row.drug_treatment.current_frequency,
                      current_route: row.drug_treatment.current_route,
                      current_dose_change: row.drug_treatment.current_dose_change,
                      duration_amount: row.drug_treatment.duration_amount,
                      unit_of_measurement_duration: row.drug_treatment.unit_of_measurement_duration,
                      treatment_begin: row.drug_treatment.treatment_begin,
                      treatment_begin_month: row.drug_treatment.treatment_begin_month,
                      treatment_end: row.drug_treatment.treatment_end,
                      treatment_end_month: row.drug_treatment.treatment_end_month,
                      treatment_on_going: row.drug_treatment.treatment_on_going,
                      severity: row.drug_treatment.severity,
                      additional_drug_info: row.drug_treatment.additional_drug_info
                    },
                    patient: {
                      sex: row.patient.sex,
                      age_group: row.patient.age_group,
                      ethnicity: row.patient.ethnicity,
                      country_treated: row.patient.country_treated,
                      race: row.patient.race
                    }
                  }
