destination_credentials: &source_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml

registry:
  credentials: ./src/use_cases/secrets/ifxdev_minio.yaml
  cache_dir: /tmp/ifx-registry-cache

resolvers:
  - label: cure_id_labels
    import: ./src/id_resolvers/cure_id_label_resolver.py
    class: CureIdLabelResolver
    kwargs:
      data_source: cure:curated_concepts:2026-05-14
      no_match_behavior: Allow
      multi_match_behavior: All
      label_field_by_type:
        Gene: symbol
      manual_label_map:
        Gene:
          Syngap:
            - NCBIGene:8831
          SYNGAP1:
            - NCBIGene:8831
        Drug:
          Epidiolex:
            - RXCUI:2058901
          Tanganil:
            - CHEBI:17786
          Sertraline:
            - RXCUI:36437
          Sertraline 25 Mg Oral Tablet [Zoloft]:
            - RXCUI:36437
          Clobazam:
            - RXCUI:21241
      types:
        - Condition
        - Drug
        - Gene
        - Phenotype

input_adapters:
  - import: ./src/input_adapters/cure/cureid_curated_concepts_adapter.py
    class: CureIdCuratedConceptsAdapter
    kwargs:
      data_source: cure:curated_concepts:2026-05-14

  - import: ./src/input_adapters/cure/rasopathies_adapter.py
    class: RasopathiesAdapter
    kwargs:
      data_source: cure:case_reports:reports_20260612T182139Z

graph_views:
  - id: rasopathies_translator_version_info
    label: "Translator: RAS Version Info"
    description: Source version and scope metadata for the rasopathies Translator exports.
    type: export
    output_format: jsonl
    query_language: aql
    query: |
      LET approved_case_reports = (
        FOR report IN `CaseReport`
          FILTER report.form_type == "rasopathies"
          FILTER report.status == "Approved"
          SORT report.id
          RETURN report
      )
      LET source_versions = (
        FOR source IN UNIQUE(FLATTEN(approved_case_reports[*].sources || []))
          LET parts = SPLIT(source, "\t")
          SORT parts[0], parts[1]
          RETURN {
            name: parts[0],
            version: parts[1] == "None" ? null : parts[1],
            version_date: parts[2] == "None" ? null : parts[2],
            download_date: parts[3] == "None" ? null : parts[3]
          }
      )
      RETURN {
        id: "cure_rasopathies_translator",
        label: "Translator: RAS",
        scope: {
          form_type: "rasopathies",
          status: "Approved",
          case_report_count: LENGTH(approved_case_reports)
        },
        source_versions: source_versions,
        association_view_ids: [
          "rasopathies_condition_has_phenotype",
          "rasopathies_drug_applied_to_treat_condition",
          "rasopathies_drug_applied_to_treat_phenotype",
          "rasopathies_drug_has_adverse_event",
          "rasopathies_gene_associated_with_condition",
          "rasopathies_gene_has_sequence_variant",
          "rasopathies_sequence_variant_genetically_associated_with_condition"
        ]
      }

  - id: rasopathies_condition_has_phenotype
    label: "Translator: RAS Condition Has Phenotype"
    description: One JSONL record per condition-phenotype pair, with clinical finding and patient evidence preserved.
    type: export
    output_format: jsonl
    query_language: aql
    query: |
      FOR condition IN `Condition`
        FOR clinical_context IN INBOUND condition `ClinicalContextConditionEdge`
          FOR finding IN OUTBOUND clinical_context `ClinicalContextFindingEdge`
            FOR phenotype IN OUTBOUND finding `FindingPhenotypeEdge`
              LET patient = FIRST(
                FOR p IN INBOUND clinical_context `PatientClinicalContextEdge`
                  LIMIT 1
                  RETURN p
              )
              LET case_report = patient == null ? null : FIRST(
                FOR report IN INBOUND patient `CaseReportPatientEdge`
                  LIMIT 1
                  RETURN report
              )
              COLLECT
                condition_id = condition.id,
                phenotype_id = phenotype.id
              INTO grouped = {
                condition: condition,
                phenotype: phenotype,
                finding: finding,
                patient: patient,
                case_report: case_report
              }
              LET condition_doc = FIRST(grouped[*].condition)
              LET phenotype_doc = FIRST(grouped[*].phenotype)
              LET patient_ids = UNIQUE(
                FOR row IN grouped
                  FILTER row.patient != null
                  RETURN row.patient.id
              )
              LET case_report_ids = UNIQUE(
                FOR row IN grouped
                  FILTER row.case_report != null
                  RETURN row.case_report.id
              )
              LET patient_count = LENGTH(patient_ids)
              LET case_report_count = LENGTH(case_report_ids)
              SORT patient_count DESC, case_report_count DESC, condition_doc.name, phenotype_doc.name
              RETURN {
                condition: {
                  id: condition_doc.id,
                  xref: condition_doc.xref,
                  name: condition_doc.name
                },
                predicate: {
                  id: "has_phenotype",
                  label: "has phenotype"
                },
                phenotype: {
                  id: phenotype_doc.id,
                  xref: phenotype_doc.xref,
                  name: phenotype_doc.name
                },
                patient_count: patient_count,
                case_report_count: case_report_count,
                evidence: (
                  FOR row IN grouped
                    SORT row.case_report.id, row.finding.id
                    RETURN {
                      case_report: {
                        id: row.case_report.id,
                        url: row.case_report.case_report_url
                      },
                      finding: {
                        source_value: row.finding.source_value,
                        source_text: row.finding.source_text,
                        group: row.finding.group
                      },
                      patient: {
                        sex: row.patient.sex,
                        age_group: row.patient.age_group,
                        ethnicity: row.patient.ethnicity,
                        country_treated: row.patient.country_treated,
                        race: row.patient.race
                      }
                    }
                )
              }

