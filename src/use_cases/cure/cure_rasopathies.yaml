            )
            LET case_report = patient == null ? null : FIRST(
              FOR report IN INBOUND patient `CaseReportPatientEdge`
                LIMIT 1
                RETURN report
            )
            COLLECT
              gene_variant_id = gene_variant.id,
              condition_id = condition.id
            INTO grouped = {
              gene_variant: gene_variant,
              diagnosis: diagnosis,
              condition: condition,
              patient: patient,
              case_report: case_report
            }
            LET gene_variant_doc = FIRST(grouped[*].gene_variant)
            LET condition_doc = FIRST(grouped[*].condition)
            LET patient_ids = UNIQUE(
              FOR row IN grouped
                FILTER row.patient != null
                RETURN row.patient.id
            )
            LET case_report_ids = UNIQUE(
              FOR row IN grouped
                FILTER row.case_report != null
                RETURN row.case_report.id
            )
            LET patient_count = LENGTH(patient_ids)
            LET case_report_count = LENGTH(case_report_ids)
            SORT patient_count DESC, case_report_count DESC, gene_variant_doc.variant_label, condition_doc.name
            RETURN {
              gene_variant: {
                id: gene_variant_doc.id,
                xref: gene_variant_doc.xref,
                source_gene_symbol: gene_variant_doc.source_gene_symbol,
                nucleotide_change: gene_variant_doc.nucleotide_change,
                protein_change: gene_variant_doc.protein_change,
                variant_label: gene_variant_doc.variant_label
              },
              predicate: {
                id: "genetically_associated_with",
                label: "genetically associated with"
              },
              condition: {
                id: condition_doc.id,
                xref: condition_doc.xref,
                name: condition_doc.name
              },
              patient_count: patient_count,
              case_report_count: case_report_count,
              evidence: (
                FOR row IN grouped
                  SORT row.case_report.id, row.diagnosis.id
                  RETURN {
                    case_report: {
                      id: row.case_report.id,
                      url: row.case_report.case_report_url
                    },
                    diagnosis: {
                      diagnosis_methods: row.diagnosis.diagnosis_methods
                    },
                    patient: {
                      sex: row.patient.sex,
                      age_group: row.patient.age_group,
                      ethnicity: row.patient.ethnicity,
                      country_treated: row.patient.country_treated,
                      race: row.patient.race
                    }
                  }
              )
            }

output_adapters:
  - import: ./src/output_adapters/arango_output_adapter.py
    class: ArangoOutputAdapter
    kwargs:
      database_name: cure_rasopathies
    credentials: *source_credentials
