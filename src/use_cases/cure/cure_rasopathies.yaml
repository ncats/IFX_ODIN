                    xref: phenotype_doc.xref,
                    name: phenotype_doc.name
                  },
                  patient_count: patient_count,
                  case_report_count: case_report_count,
                  outcomes: outcomes,
                  evidence: (
                    FOR row IN grouped
                      SORT row.case_report.id, row.drug_treatment.id, row.treatment_response.id
                      RETURN {
                        case_report: {
                          id: row.case_report.id,
                          url: row.case_report.case_report_url
                        },
                        drug_treatment: {
                          initial_dose_amount: row.drug_treatment.initial_dose_amount,
                          initial_unit_of_measurement: row.drug_treatment.initial_unit_of_measurement,
                          initial_frequency: row.drug_treatment.initial_frequency,
                          initial_route: row.drug_treatment.initial_route,
                          current_dose_amount: row.drug_treatment.current_dose_amount,
                          current_unit_of_measurement: row.drug_treatment.current_unit_of_measurement,
                          current_frequency: row.drug_treatment.current_frequency,
                          current_route: row.drug_treatment.current_route,
                          current_dose_change: row.drug_treatment.current_dose_change,
                          duration_amount: row.drug_treatment.duration_amount,
                          unit_of_measurement_duration: row.drug_treatment.unit_of_measurement_duration,
                          treatment_begin: row.drug_treatment.treatment_begin,
                          treatment_begin_month: row.drug_treatment.treatment_begin_month,
                          treatment_end: row.drug_treatment.treatment_end,
                          treatment_end_month: row.drug_treatment.treatment_end_month,
                          treatment_on_going: row.drug_treatment.treatment_on_going,
                          severity: row.drug_treatment.severity,
                          additional_drug_info: row.drug_treatment.additional_drug_info
                        },
                        treatment_response: {
                          target_role: row.treatment_response.target_role,
