destination_credentials: &destination_credentials ./src/use_cases/secrets/pharos_write_credentials.yaml
destination_database: &destination_database pharos400

source_credentials: &source_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml
source_database: &source_database pharos

legacy_pharos_credentials: &legacy_pharos_credentials ./src/use_cases/secrets/pharos_credentials.yaml
pubmed_credentials: &pubmed_credentials ./src/use_cases/secrets/ifx_pubmed_credentials.yaml

meets_idg_criteria: &meets_idg_criteria true

registry:
  credentials: ./src/use_cases/secrets/ifxdev_minio.yaml
  cache_dir: /tmp/ifx-registry-cache

resolvers:
  # Important: keep Disease resolution and Target resolution aligned with src/use_cases/pharos/pharos.yaml.
  # otherwise, IDs could drift between pharos.yaml and tcrd.yaml.
  - label: translator_nn
    import: ./src/id_resolvers/node_normalizer.py
    class: TranslatorNodeNormResolver
    kwargs:
      types:
        - Disease

  - label: tcrd_targets
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TCRDTargetResolver
    kwargs:
      canonical_type: Protein
      collapse_to_canonical: true
      no_match_behavior: Skip
      gene_data_source: target_graph:gene_ids:2026-05-11
      transcript_data_source: target_graph:transcript_ids:2026-05-11
      protein_data_source: target_graph:protein_ids:2026-05-20
      uniprot_mapping_data_source: target_graph:uniprot_mapping:2026-05-11
      types:
        - Protein
        - Gene
        - Transcript

input_adapters:
  - import: ./src/input_adapters/pharos_source_tcrd/ontology_tables.py
    class: MondoTableAdapter
    kwargs:
      data_source: mondo:ontology:2026-06-02

  - import: ./src/input_adapters/pharos_source_tcrd/ontology_tables.py
    class: MondoTableParentEdgeAdapter
    kwargs:
      data_source: mondo:ontology:2026-06-02

  - import: ./src/input_adapters/pharos_source_tcrd/ontology_tables.py
    class: DOTableAdapter
    kwargs:
      data_source: disease_ontology:ontology:2026-05-30

  - import: ./src/input_adapters/pharos_source_tcrd/ontology_tables.py
    class: DOTableParentEdgeAdapter
    kwargs:
      data_source: disease_ontology:ontology:2026-05-30

  - import: ./src/input_adapters/pharos_arango/tcrd/protein.py
    class: ProteinAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_mysql/harmonizome_adapter.py
    class: HarmonizomeGeneAttributeTypeAdapter
    credentials: *legacy_pharos_credentials

  - import: ./src/input_adapters/pharos_mysql/harmonizome_adapter.py
    class: HarmonizomeHgramCDFAdapter
    credentials: *legacy_pharos_credentials

  - import: ./src/input_adapters/pharos_source_tcrd/word_count.py
    class: WordCountAdapter
    credentials: *destination_credentials
    kwargs:
      database_name: *destination_database
      pubmed_credentials: *pubmed_credentials

  - import: ./src/input_adapters/pharos_arango/tcrd/phipster.py
    class: PHIPSTERAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/ortholog.py
    class: OrthologGeneAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/ortholog.py
    class: ProteinOrthologGeneEdgeAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/ortholog.py
    class: OrthologGeneMousePhenotypeAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/ortholog.py
    class: ProteinMousePhenotypeAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_mysql/drgc_resource_adapter.py
    class: DRGCResourceAdapter
    credentials: *legacy_pharos_credentials

  - import: ./src/input_adapters/pharos_arango/tcrd/ppi.py
    class: ProteinPPIAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/go_terms.py
    class: GoTermAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/ligand_node.py
    class: LigandNodeAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database
      meets_idg_criteria: *meets_idg_criteria

  - import: ./src/input_adapters/pharos_arango/tcrd/ligand_node.py
    class: LigandEdgeAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database
      meets_idg_criteria: *meets_idg_criteria

  - import: ./src/input_adapters/pharos_arango/tcrd/tissue.py
    class: TissueAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/tissue.py
    class: ExpressionAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/disease.py
    class: DiseaseAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database
      associated_only: false

  - import: ./src/input_adapters/pharos_arango/tcrd/disease.py
    class: ProteinDiseaseAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/tiga.py
    class: ProteinGwasTraitAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  # Direct source-file TIN-X importance load.
  # This intentionally bypasses graph TINXImportanceEdge materialization to avoid
  # very large edge volume in pharos.yaml, but it creates a short-term dependency
  # on Disease resolution matching pharos.yaml.
  - import: ./src/input_adapters/jensenlab/tinx.py
    class: TINXImportanceFileAdapter
    kwargs:
      data_source: jensenlab:tinx:2026-05-31

  - import: ./src/input_adapters/pharos_arango/tcrd/pathway.py
    class: ProteinPathwayAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/panther.py
    class: PantherClassAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/panther.py
    class: ProteinPantherClassAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/dto.py
    class: DTOClassAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/dto.py
    class: DTOClassParentAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/dto.py
    class: ProteinDTOClassAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/keyword.py
    class: ProteinKeywordAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/linkouts.py
    class: ExternalLinkProviderAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/linkouts.py
    class: ProteinExternalLinkAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

  - import: ./src/input_adapters/pharos_source_tcrd/datasource_map.py
    class: DataSourceMapAdapter
    credentials: *destination_credentials
    kwargs:
      database_name: *destination_database
      source_graph_credentials_path: *source_credentials
      source_graph_database: *source_database
      include_graph_activity_rules: true
      include_chembl_activity_rule: true

output_adapters:
  - import: ./src/output_adapters/mysql_output_adapter.py
    class: TCRDOutputAdapter
    kwargs:
      database_name: *destination_database
      truncate_tables: true
      source_graph_credentials: *source_credentials
      source_graph_database: *source_database
    credentials: *destination_credentials
