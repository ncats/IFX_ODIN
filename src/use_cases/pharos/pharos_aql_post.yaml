source_credentials: &source_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml
database_name: &database_name pharos

resolvers:
  - label: tcrd_targets
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TCRDTargetResolver
    kwargs:
      canonical_type: Protein
      collapse_reviewed_targets: true
      no_match_behavior: Skip
      gene_file_path: ./input_files/manual/target_graph/gene_ids.tsv
      transcript_file_path: ./input_files/manual/target_graph/transcript_ids.tsv
      protein_file_paths:
        - ./input_files/manual/target_graph/protein_ids.tsv
      additional_ids: ./input_files/manual/target_graph/uniprotkb_mapping_20260315.csv
      types:
        - Protein
        - Gene
        - Transcript

input_adapters:

  - import: ./src/input_adapters/pharos_arango/set_preferred_symbol.py
    class: SetPreferredSymbolAdapter
    kwargs:
      database_name: *database_name
    credentials: *source_credentials

  - import: ./src/input_adapters/pharos_arango/set_ligand_activity_flag.py
    class: SetLigandActivityFlagAdapter
    kwargs:
      database_name: *database_name
    credentials: *source_credentials

  - import: ./src/input_adapters/pharos_arango/set_go_term_leaf_flag.py
    class: SetGoTermLeafFlagAdapter
    kwargs:
      database_name: *database_name
    credentials: *source_credentials

  - import: ./src/input_adapters/pharos_arango/tdl_input_adapter.py
    class: TDLInputAdapter
    kwargs:
      database_name: *database_name
      use_pharos_queries: True
    credentials: *source_credentials

  - import: ./src/input_adapters/manual/tdl_override.py
    class: TDLOverrideAdapter
    kwargs:
      file_path: ./input_files/manual/target_graph/tdl_updates.csv

graph_views:
  - id: current_tdls
    label: Current TDLs
    description: Export current protein TDL assignments
    type: export
    output_format: csv
    query_language: aql
    columns:
      - id
      - uniprot_id
      - tdl
      - uniprot_reviewed
      - uniprot_annotationScore
      - name
      - xref
      - idg_family
      - uniprot_function
      - symbol
      - ncbi_id
      - ensembl_id
      - uniprot_canonical
      - uniprot_isoform
      - tdl_ligand_count
      - tdl_drug_count
      - tdl_go_term_count
      - tdl_generif_count
      - tdl_pm_score
      - tdl_antibody_count
    query: |
      FOR pro IN `Protein`
        RETURN {
          id: pro.id,
          uniprot_id: pro.uniprot_id,
          tdl: pro.tdl,
          uniprot_reviewed: pro.uniprot_reviewed,
          uniprot_annotationScore: pro.uniprot_annotationScore,
          name: pro.name,
          xref: pro.xref,
          idg_family: pro.idg_family,
          uniprot_function: pro.uniprot_function,
          symbol: pro.symbol,
          ncbi_id: pro.ncbi_id,
          ensembl_id: pro.ensembl_id,
          uniprot_canonical: pro.uniprot_canonical,
          uniprot_isoform: pro.uniprot_isoform,
          tdl_ligand_count: pro.tdl_meta.tdl_ligand_count,
          tdl_drug_count: pro.tdl_meta.tdl_drug_count,
          tdl_go_term_count: pro.tdl_meta.tdl_go_term_count,
          tdl_generif_count: pro.tdl_meta.tdl_generif_count,
          tdl_pm_score: pro.tdl_meta.tdl_pm_score,
          tdl_antibody_count: pro.tdl_meta.tdl_antibody_count
        }

output_adapters:
  - import: ./src/output_adapters/arango_output_adapter.py
    class: ArangoOutputAdapter
    kwargs:
      database_name: *database_name
    credentials: *source_credentials
