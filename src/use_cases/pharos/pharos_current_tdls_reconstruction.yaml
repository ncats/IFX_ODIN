source_credentials: &source_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml
legacy_pharos_credentials: &legacy_pharos_credentials ./src/use_cases/secrets/pharos_credentials.yaml
database_name: &database_name pharos_current_tdls_reconstruction
pchembl_cutoff: &pchembl_cutoff 5

registry:
  credentials: ./src/use_cases/secrets/ifxdev_minio.yaml
  cache_dir: /tmp/ifx-registry-cache

resolvers:
  - label: translator_nn
    import: ./src/id_resolvers/node_normalizer.py
    class: TranslatorNodeNormResolver
    kwargs:
      resolver_snapshot: translator:translator_nn:deps-1bdfc6008ae1
      types:
        - Ligand

  - label: tcrd_targets
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TCRDTargetResolver
    kwargs:
      resolver_snapshot: target_graph:tcrd_targets:deps-d6d9894c3969
      types:
        - Protein
        - Gene
        - Transcript
      no_match_behavior: Skip

input_adapters:
  - import: ./src/input_adapters/go/go_term.py
    class: GOTermAdapter
    kwargs:
      data_source: go:ontology:2026-01-23

  - import: ./src/input_adapters/target_graph/protein_nodes_and_edges.py
    class: ProteinNodeAdapter
    kwargs:
      data_source: target_graph:protein_ids:2026-05-20
      canonical_only: true

  - import: ./src/input_adapters/drug_central/drug_node.py
    class: DrugNodeAdapter
    kwargs:
      data_source: drugcentral:drug_database:54
    credentials: ./src/use_cases/secrets/drugcentral_credentials.yaml

  - import: ./src/input_adapters/drug_central/protein_drug_edge.py
    class: ProteinDrugEdgeAdapter
    kwargs:
      data_source: drugcentral:drug_database:54
    credentials: ./src/use_cases/secrets/drugcentral_credentials.yaml

  - import: ./src/input_adapters/iuphar/ligand_node.py
    class: LigandNodeAdapter
    kwargs:
      data_source: iuphar:ligands_interactions:2026-06-15

  - import: ./src/input_adapters/iuphar/protein_ligand_edge.py
    class: ProteinLigandEdgeAdapter
    kwargs:
      pchembl_cutoff: *pchembl_cutoff
      data_source: iuphar:ligands_interactions:2026-06-15

  - import: ./src/input_adapters/chembl/drug_node.py
    class: DrugNodeAdapter
    kwargs:
      data_source: chembl:activity_database:chembl36
      pchembl_cutoff: *pchembl_cutoff
    credentials: ./src/use_cases/secrets/chembl_credentials.yaml

  - import: ./src/input_adapters/chembl/drug_node.py
    class: ProteinDrugEdgeAdapter
    kwargs:
      data_source: chembl:activity_database:chembl36
      pchembl_cutoff: *pchembl_cutoff
    credentials: ./src/use_cases/secrets/chembl_credentials.yaml

  - import: ./src/input_adapters/jensenlab/total_pmscore.py
    class: TotalPMScoreAdapter
    kwargs:
      data_source: jensenlab:protein_counts:2026-03-10-recovered

  - import: ./src/input_adapters/antibodypedia/antibody_count.py
    class: AntibodyCountAdapter
    kwargs:
      data_source: antibodypedia:scraped_results:2025-06-27_12-32

  - import: ./src/input_adapters/go/go_gaf.py
    class: ProteinGoTermEdgeAdapter
    kwargs:
      data_source: go:goa_human_uniprot:2025-12-04
      source: UniProt

  - import: ./src/input_adapters/go/go_gaf.py
    class: ProteinGoTermEdgeAdapter
    kwargs:
      data_source: go:goa_human_go:2026-01-23
      source: GO

  - import: ./src/input_adapters/ncbi/publications.py
    class: NCBIPublicationAdapter
    kwargs:
      data_source: ncbi:publications:2026-06-17

  - import: ./src/input_adapters/pharos_mysql/idg_family_adapter.py
    class: IDGFamilyAdapter
    kwargs:
      data_source: legacy_pharos:pharos319_mysql:pharos319
    credentials: *legacy_pharos_credentials

output_adapters:
  - import: ./src/output_adapters/arango_output_adapter.py
    class: ArangoOutputAdapter
    kwargs:
      database_name: *database_name
    credentials: *source_credentials
