    kwargs:
      data_source: legacy_pharos:pharos319_mysql:pharos319
    credentials: *legacy_pharos_credentials

  - import: ./src/input_adapters/hcop/orthologs.py
    class: HCOPOrthologAdapter
    kwargs:
      data_source: hcop:human_all_sixteen_column:2025-05-16
      accepted_species:
        - "9598"
        - "9544"
        - "10090"
        - "10116"
        - "9615"
        - "9796"
        - "9913"
        - "9823"
