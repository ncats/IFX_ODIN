source_credentials: &source_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml
legacy_pharos_credentials: &legacy_pharos_credentials ./src/use_cases/secrets/pharos_credentials.yaml
database_name: &database_name target_graph
pchembl_cutoff: &pchembl_cutoff 5

registry:
  credentials: ./src/use_cases/secrets/ifxdev_minio.yaml
  cache_dir: /tmp/ifx-registry-cache

resolvers:
  - label: translator_nn
    import: ./src/id_resolvers/node_normalizer.py
    class: TranslatorNodeNormResolver
    kwargs:
      resolver_snapshot: translator:translator_nn:deps-c85fd1cd8666
      types:
        - Ligand

  - label: disease_ids
    import: ./src/id_resolvers/disease_resolver.py
    class: DiseaseIdResolver
    kwargs:
      resolver_snapshot: target_graph:disease_ids:deps-3a3de6aa6530
      types:
        - Disease
      multi_match_behavior: All

  - label: tg_genes
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TargetGraphGeneResolver
    kwargs:
      resolver_snapshot: target_graph:tg_genes:deps-bfc39ea04a27
      types:
        - Gene
      no_match_behavior: Skip

  - label: tg_transcripts
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TargetGraphTranscriptResolver
    kwargs:
      resolver_snapshot: target_graph:tg_transcripts:deps-d2da338291d8
      types:
        - Transcript
      no_match_behavior: Skip

  - label: tg_proteins
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TargetGraphProteinResolver
    kwargs:
      resolver_snapshot: target_graph:tg_proteins:deps-58d20dbbd04f
      types:
        - Protein
      no_match_behavior: Skip

  - label: hcop_ortholog_genes
    import: ./src/id_resolvers/hcop_ortholog_gene_resolver.py
    class: HCOPOrthologGeneResolver
    kwargs:
      resolver_snapshot: hcop:hcop_ortholog_genes:deps-8fb0b25b5955
      types:
        - OrthologGene

  - label: tissue_ids
    import: ./src/id_resolvers/tissue_resolver.py
    class: TissueResolver
    kwargs:
      resolver_snapshot: uberon:tissue_ids:deps-068438ffba3c
      types:
        - Tissue

input_adapters:
  - import: ./src/input_adapters/uberon_adapter.py
    class: UberonAdapter
    kwargs:
      data_source: uberon:ontology:2026-04-01

  - import: ./src/input_adapters/go/go_term.py
    class: GOTermAdapter
    kwargs:
      data_source: go:ontology:2026-05-28

  - import: ./src/input_adapters/target_graph/protein_nodes_and_edges.py
    class: ProteinNodeAdapter
    kwargs:
      data_source: target_graph:protein_ids:2026-05-20

  - import: ./src/input_adapters/file_uniprot/protein_adapter.py
    class: ProteinAdapter
    kwargs:
      data_source: uniprot:human:2026_02
      file_name: uniprot-human.json.gz

  - import: ./src/input_adapters/target_graph/protein_nodes_and_edges.py
    class: IsoformProteinEdgeAdapter
    kwargs:
      data_source: target_graph:protein_ids:2026-05-20

  - import: ./src/input_adapters/target_graph/gene_node.py
    class: GeneNodeAdapter
