    kwargs:
      file_path: ./input_files/auto/mondo/mondo.json

  - import: ./src/input_adapters/mondo/mondo_adapter.py
    class: MondoDiseaseParentEdgeAdapter
    kwargs:
      file_path: ./input_files/auto/mondo/mondo.json

  - import: ./src/input_adapters/disease_ontology/do_adapter.py
    class: DODiseaseAdapter
    kwargs:
      file_path: ./input_files/auto/disease_ontology/doid.json

  - import: ./src/input_adapters/disease_ontology/do_adapter.py
    class: DODiseaseParentEdgeAdapter
    kwargs:
      file_path: ./input_files/auto/disease_ontology/doid.json

  - import: ./src/input_adapters/jensenlab/diseases.py
    class: JensenLabDiseasesAdapter
    kwargs:
      knowledge_file_path: ./input_files/auto/jensenlab/human_disease_knowledge_filtered.tsv
      experiments_file_path: ./input_files/auto/jensenlab/human_disease_experiments_filtered.tsv
      textmining_file_path: ./input_files/auto/jensenlab/human_disease_textmining_filtered.tsv
      version_file_path: ./input_files/auto/jensenlab/diseases_version.tsv
