source_credentials: &source_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml

pchembl_cutoff: &pchembl_cutoff 5

resolvers:
  - label: translator_nn
    import: ./src/id_resolvers/node_normalizer.py
    class: TranslatorNodeNormResolver
    kwargs:
      types:
        - Ligand
        - Disease

  - label: tg_genes
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TargetGraphGeneResolver
    kwargs:
      no_match_behavior: Skip
      file_path: ./input_files/manual/target_graph/gene_ids.tsv
      types:
        - Gene

  - label: tg_transcripts
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TargetGraphTranscriptResolver
    kwargs:
      no_match_behavior: Skip
      file_path: ./input_files/manual/target_graph/transcript_ids.tsv
      types:
        - Transcript

  - label: tg_proteins
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TargetGraphProteinResolver
    kwargs:
      no_match_behavior: Skip
      file_paths:
        - ./input_files/manual/target_graph/protein_ids.tsv
      additional_ids: ./input_files/manual/target_graph/uniprotkb_mapping_20260315.csv
      types:
        - Protein

  - label: tissue_ids
    import: ./src/id_resolvers/tissue_resolver.py
    class: TissueResolver
    kwargs:
      file_path: ./input_files/auto/uberon/uberon.obo
      valid_ontologies:
        - FMA
        - EMAPA
        - MA
        - UMLS
        - NCIT
        - ZFA
        - BTO
        - CLDB
        - EHDAA2
        - BAMS
        - neuronames
        - VHOG
        - MESH
        - BIRNLEX
        - TAO
        - EHDAA
        - GAID
        - DHBA
        - CALOHA
        - EFO
        - XAO
        - HBA
        - OpenCyc
        - MBA
        - galen
        - FBbt
        - GC_ID
        - EV
        - DMBA
        - BM
        - MAT
        - MIAA
        - NLXANAT
        - VSAO
        - AEO
        - RETIRED_EHDAA2
        - KUPO
        - Wikipedia
        - NLX
        - ZFS
        - UBERONTEMP
        - UBERON
        - TGMA
        - TE
        - TADS
        - STID
        - SPD
        - SCTID
        - SAO
        - PHENOSCAPE
        - PBA
        - OGES
        - OGEM
        - NOID
        - NIFSTD
        - MURDOCH
        - MPATH
        - MP
        - MFMO
        - MAP
        - ISBN
        - HAO
        - GOC
        - GO
        - FMAID
        - FAO
        - EVM
        - ENVO
        - EMAPS
        - EHDA
        - CP
        - CL
        - CARO
        - BSA
        - BILS
        - BILA
        - ANISEED
        - ABA
        - AAO
      types:
        - Tissue

input_adapters:
  - import: ./src/input_adapters/uberon_adapter.py
    class: UberonAdapter
    kwargs:
      file_path: ./input_files/auto/uberon/uberon.obo

  - import: ./src/input_adapters/go/go_term.py
    class: GOTermAdapter
    kwargs:
      file_path: ./input_files/auto/go/go-basic.json

  - import: ./src/input_adapters/target_graph/protein_nodes_and_edges.py
    class: ProteinNodeAdapter
    kwargs:
      file_path: ./input_files/manual/target_graph/protein_ids.tsv

  - import: ./src/input_adapters/file_uniprot/protein_adapter.py
    class: ProteinAdapter
    kwargs:
      file_path: ./input_files/auto/uniprot/uniprot-human.json.gz
      version_file_path: ./input_files/auto/uniprot/uniprot_version.tsv

  - import: ./src/input_adapters/string/string_ppi.py
    class: StringPPIAdapter
    kwargs:
      file_path: ./input_files/auto/string/9606.protein.links.v12.0.txt.gz
      version_file_path: ./input_files/auto/string/string_version.tsv
      score_cutoff: 400

  - import: ./src/input_adapters/bioplex/bioplex_ppi.py
    class: BioPlexPPIAdapter
    kwargs:
      file_path: ./input_files/auto/bioplex/BioPlex_293T_Network_10K_Dec_2019.tsv
      version_file_path: ./input_files/auto/bioplex/bioplex_version.tsv

  - import: ./src/input_adapters/bioplex/bioplex_ppi.py
