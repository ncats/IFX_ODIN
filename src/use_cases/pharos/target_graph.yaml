  - import: ./src/input_adapters/gtex/gtex_expression.py
    class: GTExExpressionAdapter
    kwargs:
      matrix_file_path: ./input_files/auto/gtex/GTEx_Analysis_2025_08_22_v11_RNASeQCv2.4.3_gene_tpm.gct.gz
