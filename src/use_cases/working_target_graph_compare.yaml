source_credentials: &source_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml

resolvers:
  - label: tg_genes
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TargetGraphGeneResolver
    kwargs:
      no_match_behavior: Skip
      file_path: /Users/kelleherkj/Downloads/260401Targets/gene_ids.tsv
      types:
        - Gene

  - label: tg_proteins
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TargetGraphProteinResolver
    kwargs:
      no_match_behavior: Skip
      file_paths:
        - /Users/kelleherkj/Downloads/260401Targets/protein_ids.tsv
      additional_ids: ./input_files/manual/target_graph/uniprotkb_mapping_20260315.csv
      types:
        - Protein

  - label: tg_transcripts
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TargetGraphTranscriptResolver
    kwargs:
      no_match_behavior: Skip
      file_path: /Users/kelleherkj/Downloads/260401Targets/transcript_ids.tsv
      types:
        - Transcript

  - label: tissue_ids
