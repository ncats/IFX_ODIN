destination_credentials: &destination_credentials ./src/use_cases/secrets/pharos_write_credentials.yaml
source_credentials: &source_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml
source_database: &source_database test_pharos

resolvers:
  - label: tcrd_targets
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TCRDTargetResolver
    kwargs:
      collapse_reviewed_targets: true
      no_match_behavior: Skip
      gene_file_path: ./input_files/manual/target_graph/gene_ids.tsv
      transcript_file_path: ./input_files/manual/target_graph/transcript_ids.tsv
      protein_file_paths:
        - ./input_files/manual/target_graph/protein_ids.tsv
      additional_ids: ./input_files/manual/target_graph/uniprotkb_mapping_20260315.csv
      types:
        - Protein
        - Gene
        - Transcript

input_adapters:
  - import: ./src/input_adapters/pharos_source_tcrd/ontology_tables.py
    class: MondoTableAdapter
    kwargs:
      file_path: ./input_files/auto/mondo/mondo.json

  - import: ./src/input_adapters/pharos_source_tcrd/ontology_tables.py
    class: MondoTableParentEdgeAdapter
    kwargs:
      file_path: ./input_files/auto/mondo/mondo.json

  - import: ./src/input_adapters/pharos_source_tcrd/ontology_tables.py
    class: DOTableAdapter
    kwargs:
      file_path: ./input_files/auto/disease_ontology/doid.json

  - import: ./src/input_adapters/pharos_source_tcrd/ontology_tables.py
    class: DOTableParentEdgeAdapter
    kwargs:
      file_path: ./input_files/auto/disease_ontology/doid.json

  - import: ./src/input_adapters/pharos_arango/tcrd/protein.py
    class: ProteinAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

#  - import: ./src/input_adapters/pharos_arango/tcrd/pathway.py
#    class: ProteinPathwayAdapter
#    credentials: *source_credentials
#    kwargs:
#      database_name: *source_database
#
#  - import: ./src/input_adapters/pharos_arango/tcrd/keyword.py
#    class: ProteinKeywordAdapter
#    credentials: *source_credentials
#    kwargs:
#      database_name: *source_database

  - import: ./src/input_adapters/pharos_arango/tcrd/disease.py
    class: DiseaseAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database
      associated_only: true

  - import: ./src/input_adapters/pharos_arango/tcrd/disease.py
    class: ProteinDiseaseAdapter
    credentials: *source_credentials
    kwargs:
      database_name: *source_database

output_adapters:
  - import: ./src/output_adapters/mysql_output_adapter.py
    class: TCRDOutputAdapter
    kwargs:
      database_name: pharos400_working
      truncate_tables: true
    credentials: *destination_credentials
