input_adapters:
  - import: ./src/input_adapters/gtex/gtex_expression.py
    class: GTExExpressionAdapter
    kwargs:
      matrix_file_path: ./input_files/auto/gtex/GTEx_Analysis_2025_08_22_v11_RNASeQCv2.4.3_gene_tpm.gct.gz
      sample_attributes_file_path: ./input_files/auto/gtex/GTEx_Analysis_v11_Annotations_SampleAttributesDS.txt
      subject_phenotypes_file_path: ./input_files/auto/gtex/GTEx_Analysis_v11_Annotations_SubjectPhenotypesDS.txt
      version_file_path: ./input_files/auto/gtex/gtex_version.tsv
      max_genes: 200
      max_samples: 200

output_adapters:
  - import: ./src/output_adapters/arango_output_adapter.py
    class: ArangoOutputAdapter
    kwargs:
      database_name: test_ctd_pharos
    credentials: *source_credentials
