source_credentials: &source_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml

registry:
  credentials: ./src/use_cases/secrets/ifxdev_minio.yaml
  cache_dir: /tmp/ifx-registry-cache

resolvers:
  - label: translator_nn
    import: ./src/id_resolvers/node_normalizer.py
    class: TranslatorNodeNormResolver
    kwargs:
      resolver_snapshot: translator:translator_nn:deps-c85fd1cd8666
      types:
        - Ligand
        - Condition

input_adapters:
  - import: ./src/input_adapters/frdb/frdb_adapter.py
    class: FRDBAdapter
    kwargs:
      file_path: ./input_files/manual/frdb/cleaned_stitcher_export.json

output_adapters:
  - import: ./src/output_adapters/arango_output_adapter.py
    class: ArangoOutputAdapter
    kwargs:
      database_name: frdb
    credentials: *source_credentials
