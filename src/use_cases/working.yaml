destination_credentials: &destination_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml
minio_credentials: &minio_credentials ./src/use_cases/secrets/ifxdev_minio.yaml
ramp_sqlite_file: &ramp_sqlite_file ./input_files/auto/ramp/RaMP_SQLite_v3.0.12.sqlite

resolvers:
#  - label: ramp_resolver
#    import: ./src/id_resolvers/ramp_metabolite_resolver.py
#    class: RampMetaboliteIdResolver
#    kwargs:
#      types:
#        - Metabolite
#      sqlite_file: *ramp_sqlite_file
#
#  - label: ensembl_resolver
#    import: ./src/id_resolvers/ensembl_gene_resolver.py
#    class: EnsemblGeneResolver
#    kwargs:
#      types:
#        - Gene

  - label: uniprot_proteins
    import: ./src/id_resolvers/uniprot_resolver.py
    class: UniProtResolver
    kwargs:
      uniprot_json_path: ./input_files/auto/uniprot/uniprot-human-reviewed.json.gz
      types:
        - Protein

input_adapters:
  - import: ./src/input_adapters/file_uniprot/protein_adapter.py
    class: ProteinAdapter
    kwargs:
      file_path: ./input_files/auto/uniprot/uniprot-human-reviewed.json.gz
      version_file_path: ./input_files/auto/uniprot/uniprot_version.tsv

  - import: ./src/input_adapters/pounce_sheets/pounce_input_adapter.py
    class: PounceInputAdapter
    kwargs:
      project_file: ./input_files/manual/pounce/dingyin_proteomics/POUNCE_Project_Proteomics_DingyinDT_v2.xlsx
      experiment_files:
        - ./input_files/manual/pounce/dingyin_proteomics/POUNCE_Experiment_Proteomics_DingyinDT_v2.xlsx
      stats_results_files:
        - ./input_files/manual/pounce/dingyin_proteomics/POUNCE_StatsResults_Proteomics_DingyinDT_v2.xlsx
      validators_config: ./src/use_cases/pounce/pounce_validators.yaml

output_adapters:
  - import: ./src/output_adapters/arango_output_adapter.py
    class: ArangoOutputAdapter
    kwargs:
      database_name: test_pounce
      minio_credentials: *minio_credentials
    credentials: *destination_credentials
