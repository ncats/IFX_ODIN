source_credentials: &source_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml
#source_credentials: &source_credentials ./src/use_cases/secrets/local_arangodb.yaml

resolvers:
  - label: tcrd_targets
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TCRDTargetResolver
    kwargs:
      canonical_type: Protein
      reviewed_only: True
      no_match_behavior: Skip
      gene_file_path: ./input_files/manual/target_graph/gene_ids.csv
      transcript_file_path: ./input_files/manual/target_graph/transcript_ids.csv
      protein_file_paths:
        - ./input_files/manual/target_graph/protein_ids.csv
      additional_ids: ./input_files/manual/target_graph/uniprotkb_mapping.csv
      types:
        - Protein
        - Gene
        - Transcript

input_adapters:
  - import: ./src/input_adapters/file_uniprot/protein_adapter.py
    class: ProteinAdapter
    kwargs:
      file_path: ./input_files/auto/uniprot/uniprot-human-reviewed.json.gz
      version_file_path: ./input_files/auto/uniprot/uniprot_version.tsv

  - import: ./src/input_adapters/reactome/reactome_pathways.py
    class: ReactomePathwayAdapter
    kwargs:
      gmt_file_path: ./input_files/auto/reactome/ReactomePathways.gmt.zip
      version_file_path: ./input_files/auto/reactome/reactome_version.tsv

  - import: ./src/input_adapters/reactome/reactome_pathways.py
    class: ReactomePathwayParentEdgeAdapter
    kwargs:
      file_path: ./input_files/auto/reactome/ReactomePathwaysRelation.txt
      version_file_path: ./input_files/auto/reactome/reactome_version.tsv

  - import: ./src/input_adapters/reactome/reactome_pathways.py
    class: ReactomeProteinPathwayEdgeAdapter
    kwargs:
      file_path: ./input_files/auto/reactome/UniProt2Reactome_All_Levels.txt
      version_file_path: ./input_files/auto/reactome/reactome_version.tsv

output_adapters:
  - import: ./src/output_adapters/arango_output_adapter.py
    class: ArangoOutputAdapter
    kwargs:
      database_name: test_pharos
    credentials: *source_credentials
