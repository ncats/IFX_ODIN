destination_credentials: &destination_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml
minio_credentials: &minio_credentials ./src/use_cases/secrets/ifxdev_minio.yaml
ramp_sqlite_file: &ramp_sqlite_file ./input_files/auto/ramp/RaMP_SQLite_v3.0.12.sqlite

resolvers:
  - label: translator_nn
    import: ./src/id_resolvers/node_normalizer.py
    class: TranslatorNodeNormResolver
    kwargs:
      types:
        - Disease

  - label: tcrd_targets
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TCRDTargetResolver
    kwargs:
      canonical_type: Protein
      collapse_reviewed_targets: true
      no_match_behavior: Skip
      gene_file_path: ./input_files/manual/target_graph/gene_ids.tsv
      transcript_file_path: ./input_files/manual/target_graph/transcript_ids.tsv
      protein_file_paths:
        - ./input_files/manual/target_graph/protein_ids.tsv
      additional_ids: ./input_files/manual/target_graph/uniprotkb_mapping_20260315.csv
      types:
        - Protein
        - Gene
        - Transcript

input_adapters:
  - import: ./src/input_adapters/target_graph/protein_nodes_and_edges.py
    class: ProteinNodeAdapter
    kwargs:
      file_path: ./input_files/manual/target_graph/protein_ids.tsv
      collapse_reviewed_targets: true

  - import: ./src/input_adapters/string/string_ppi.py
    class: StringPPIAdapter
    kwargs:
      file_path: ./input_files/auto/string/9606.protein.links.v12.0.txt.gz
      version_file_path: ./input_files/auto/string/string_version.tsv
      score_cutoff: 400
      max_rows: 10000

  - import: ./src/input_adapters/bioplex/bioplex_ppi.py
    class: BioPlexPPIAdapter
    kwargs:
      file_path: ./input_files/auto/bioplex/BioPlex_293T_Network_10K_Dec_2019.tsv
      version_file_path: ./input_files/auto/bioplex/bioplex_version.tsv
      max_rows: 10000

  - import: ./src/input_adapters/bioplex/bioplex_ppi.py
    class: BioPlexPPIAdapter
    kwargs:
      file_path: ./input_files/auto/bioplex/BioPlex_HCT116_Network_5.5K_Dec_2019.tsv
      version_file_path: ./input_files/auto/bioplex/bioplex_version.tsv
      max_rows: 10000

  - import: ./src/input_adapters/reactome/reactome_ppi.py
    class: ReactomePPIAdapter
    kwargs:
      file_path: ./input_files/auto/reactome/reactome.homo_sapiens.interactions.tab-delimited.txt
      version_file_path: ./input_files/auto/reactome/reactome_version.tsv
      max_rows: 10000

output_adapters:
  - import: ./src/output_adapters/arango_output_adapter.py
    class: ArangoOutputAdapter
    kwargs:
      database_name: test_pharos
      minio_credentials: *minio_credentials
    credentials: *destination_credentials
