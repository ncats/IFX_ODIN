source_credentials: &source_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml
#source_credentials: &source_credentials ./src/use_cases/secrets/local_arangodb.yaml

resolvers:
  - label: translator_nn
    import: ./src/id_resolvers/node_normalizer.py
    class: TranslatorNodeNormResolver
    kwargs:
      types:
        - Ligand
        - Disease

  - label: tcrd_targets
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TCRDTargetResolver
    kwargs:
      reviewed_only: True
      no_match_behavior: Skip
      gene_file_path: ./input_files/manual/target_graph/gene_ids.csv
      transcript_file_path: ./input_files/manual/target_graph/transcript_ids.csv
      protein_file_paths:
        - ./input_files/manual/target_graph/protein_ids.csv
      additional_ids: ./input_files/manual/target_graph/uniprotkb_mapping.csv
      types:
        - Protein
        - Gene
        - Transcript

  - label: tissue_ids
    import: ./src/id_resolvers/tissue_resolver.py
    class: TissueResolver
    kwargs:
      file_path: ./input_files/auto/uberon/uberon.obo
      valid_ontologies:
        - FMA
        - EMAPA
        - MA
        - UMLS
        - NCIT
        - ZFA
        - BTO
        - EHDAA2
        - BAMS
        - neuronames
        - VHOG
        - MESH
        - BIRNLEX
        - TAO
        - EHDAA
        - GAID
        - DHBA
        - CALOHA
        - EFO
        - XAO
        - HBA
        - OpenCyc
        - MBA
        - galen
        - FBbt
        - GC_ID
        - EV
        - DMBA
        - BM
        - MAT
        - MIAA
        - NLXANAT
        - VSAO
        - AEO
        - RETIRED_EHDAA2
        - KUPO
        - Wikipedia
        - NLX
        - ZFS
        - UBERONTEMP
        - UBERON
        - TGMA
        - TE
        - TADS
        - STID
        - SPD
        - SCTID
        - SAO
        - PHENOSCAPE
        - PBA
        - OGES
        - OGEM
        - NOID
        - NIFSTD
        - MURDOCH
        - MPATH
        - MP
        - MFMO
        - MAP
        - ISBN
        - HAO
        - GOC
        - GO
        - FMAID
        - FAO
        - EVM
        - ENVO
        - EMAPS
        - EHDA
        - CP
        - CL
        - CARO
        - BSA
        - BILS
        - BILA
        - ANISEED
        - ABA
        - AAO
      types:
        - Tissue

input_adapters:
  - import: ./src/input_adapters/uberon_adapter.py
    class: UberonAdapter
    kwargs:
      file_path: ./input_files/auto/uberon/uberon.obo

  - import: ./src/input_adapters/target_graph/protein_nodes_and_edges.py
    class: ProteinNodeAdapter
    kwargs:
      file_path: ./input_files/manual/target_graph/protein_ids.csv
      reviewed_only: True

