source_credentials: &source_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml
database_name: &database_name test_pharos

resolvers:
  - label: disease_ids
    import: ./src/id_resolvers/disease_resolver.py
    class: DiseaseIdResolver
    kwargs:
      file_path: ./input_files/manual/target_graph/disease_ids.tsv
      multi_match_behavior: All
      types:
        - Disease

  - label: tcrd_targets
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TCRDTargetResolver
    kwargs:
      canonical_type: Protein
      collapse_to_canonical: true
      no_match_behavior: Skip
      gene_file_path: ./input_files/manual/target_graph/gene_ids.tsv
      transcript_file_path: ./input_files/manual/target_graph/transcript_ids.tsv
      protein_file_paths:
        - ./input_files/manual/target_graph/protein_ids.tsv
      additional_ids: ./input_files/manual/target_graph/uniprotkb_mapping_20260507.csv
      types:
        - Gene
        - Transcript
        - Protein

input_adapters:
  - import: ./src/input_adapters/mondo/mondo_adapter.py
    class: MondoDiseaseAdapter
    kwargs:
      file_path: ./input_files/auto/mondo/mondo.json

  - import: ./src/input_adapters/mondo/mondo_adapter.py
    class: MondoDiseaseParentEdgeAdapter
    kwargs:
      file_path: ./input_files/auto/mondo/mondo.json

  - import: ./src/input_adapters/disease_ontology/do_adapter.py
    class: DODiseaseAdapter
    kwargs:
      file_path: ./input_files/auto/disease_ontology/doid.json

  - import: ./src/input_adapters/rdas/diseases.py
    class: RDASRareDiseaseAdapter

  - import: ./src/input_adapters/target_graph/protein_nodes_and_edges.py
    class: ProteinNodeAdapter
    kwargs:
      file_path: ./input_files/manual/target_graph/protein_ids.tsv
      canonical_only: true

  - import: ./src/input_adapters/ctd/ctd_gene_disease.py
    class: CTDGeneDiseaseAdapter
    kwargs:
      file_path: ./input_files/auto/ctd/CTD_curated_genes_diseases.tsv.gz
      version_file_path: ./input_files/auto/ctd/ctd_version.tsv

output_adapters:
  - import: ./src/output_adapters/arango_output_adapter.py
    class: ArangoOutputAdapter
    kwargs:
      database_name: *database_name
    credentials: *source_credentials
