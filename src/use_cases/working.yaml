input_adapters:
  - import: ./src/input_adapters/target_graph/protein_nodes_and_edges.py
    class: ProteinNodeAdapter
    kwargs:
      file_path: ./input_files/manual/target_graph/protein_ids.csv
      reviewed_only: True

  - import: ./src/input_adapters/pathwaycommons/pathwaycommons_pathways.py
    class: PathwayCommonsPathwayAdapter
    kwargs:
      file_path: ./input_files/auto/pathwaycommons/pc-hgnc.gmt.gz
      version_file_path: ./input_files/auto/pathwaycommons/pathwaycommons_version.tsv

  - import: ./src/input_adapters/pathwaycommons/pathwaycommons_pathways.py
    class: PathwayCommonsProteinPathwayEdgeAdapter
    kwargs:
      file_path: ./input_files/auto/pathwaycommons/pc-hgnc.gmt.gz
      version_file_path: ./input_files/auto/pathwaycommons/pathwaycommons_version.tsv

output_adapters:
  - import: ./src/output_adapters/arango_output_adapter.py
    class: ArangoOutputAdapter
    kwargs:
      database_name: test_pharos
    credentials: *source_credentials
