destination_credentials: &destination_credentials ./src/use_cases/secrets/ifxdev_arangodb.yaml
minio_credentials: &minio_credentials ./src/use_cases/secrets/ifxdev_minio.yaml
ramp_sqlite_file: &ramp_sqlite_file ./input_files/auto/ramp/RaMP_SQLite_v3.0.12.sqlite

resolvers:
  - label: translator_nn
    import: ./src/id_resolvers/node_normalizer.py
    class: TranslatorNodeNormResolver
    kwargs:
      types:
        - Disease

  - label: tcrd_targets
    import: ./src/id_resolvers/target_graph_resolver.py
    class: TCRDTargetResolver
    kwargs:
      canonical_type: Protein
      collapse_reviewed_targets: true
      no_match_behavior: Skip
      gene_file_path: ./input_files/manual/target_graph/gene_ids.tsv
      transcript_file_path: ./input_files/manual/target_graph/transcript_ids.tsv
      protein_file_paths:
        - ./input_files/manual/target_graph/protein_ids.tsv
      additional_ids: ./input_files/manual/target_graph/uniprotkb_mapping_20260315.csv
      types:
        - Protein
        - Gene
        - Transcript

  - label: hcop_ortholog_genes
    import: ./src/id_resolvers/hcop_ortholog_gene_resolver.py
    class: HCOPOrthologGeneResolver
    kwargs:
      file_path: ./input_files/auto/hcop/human_all_hcop_sixteen_column.txt.gz
      accepted_species:
        - "9598"
        - "9544"
        - "10090"
        - "10116"
        - "9615"
        - "9796"
        - "9913"
        - "9823"
        - "13616"
        - "9258"
        - "9031"
        - "28377"
        - "8364"
        - "7955"
        - "6239"
        - "7227"
        - "4932"
      drop_blank_ortholog_identity: true
      types:
        - OrthologGene

input_adapters:
  - import: ./src/input_adapters/target_graph/protein_nodes_and_edges.py
    class: ProteinNodeAdapter
    kwargs:
      file_path: ./input_files/manual/target_graph/protein_ids.tsv
      collapse_reviewed_targets: true

  - import: ./src/input_adapters/hcop/orthologs.py
    class: HCOPOrthologAdapter
    kwargs:
      file_path: ./input_files/auto/hcop/human_all_hcop_sixteen_column.txt.gz
      version_file_path: ./input_files/auto/hcop/hcop_version.tsv
      accepted_species:
        - "9598"
        - "9544"
        - "10090"
        - "10116"
        - "9615"
        - "9796"
        - "9913"
        - "9823"
        - "13616"
        - "9258"
        - "9031"
        - "28377"
        - "8364"
        - "7955"
        - "6239"
        - "7227"
        - "4932"
      drop_blank_ortholog_identity: true

  - import: ./src/input_adapters/mp/phenotype_terms.py
    class: MPPhenotypeAdapter
    kwargs:
      file_path: ./input_files/auto/mp/mp.obo

  - import: ./src/input_adapters/impc/phenotypes.py
    class: IMPCPhenotypeAdapter
    kwargs:
      file_path: ./input_files/auto/impc/genotype-phenotype-assertions-IMPC.csv.gz
      version_file_path: ./input_files/auto/impc/impc_version.tsv

  - import: ./src/input_adapters/mgi/hmd_human_phenotype.py
    class: HMDHumanPhenotypeAdapter
    kwargs:
      file_path: ./input_files/auto/mgi/HMD_HumanPhenotype.rpt
      version_file_path: ./input_files/auto/mgi/mgi_hmd_version.tsv

output_adapters:
  - import: ./src/output_adapters/arango_output_adapter.py
    class: ArangoOutputAdapter
    kwargs:
      database_name: test_pharos
      minio_credentials: *minio_credentials
    credentials: *destination_credentials
