input_adapters:
  - import: ./src/input_adapters/target_graph/protein_nodes_and_edges.py
    class: ProteinNodeAdapter
    kwargs:
      file_path: ./input_files/manual/target_graph/protein_ids.tsv
      reviewed_only: true

graph_views:
  - id: current_tdls
    label: Current TDLs
    description: Export current protein TDL assignments
    type: export
    output_format: csv
    query_language: aql
    columns:
      - id
      - uniprot_id
      - tdl
      - uniprot_reviewed
      - uniprot_annotationScore
      - name
      - xref
      - idg_family
      - uniprot_function
      - symbol
      - ncbi_id
      - ensembl_id
      - uniprot_canonical
      - uniprot_isoform
      - tdl_ligand_count
      - tdl_drug_count
      - tdl_go_term_count
      - tdl_generif_count
      - tdl_pm_score
      - tdl_antibody_count
    query: |
      FOR pro IN `Protein`
        RETURN {
          id: pro.id,
          uniprot_id: pro.uniprot_id,
          tdl: pro.tdl,
          uniprot_reviewed: pro.uniprot_reviewed,
          uniprot_annotationScore: pro.uniprot_annotationScore,
          name: pro.name,
          xref: pro.xref,
          idg_family: pro.idg_family,
          uniprot_function: pro.uniprot_function,
          symbol: pro.symbol,
          ncbi_id: pro.ncbi_id,
          ensembl_id: pro.ensembl_id,
          uniprot_canonical: pro.uniprot_canonical,
          uniprot_isoform: pro.uniprot_isoform,
          tdl_ligand_count: pro.tdl_ligand_count,
          tdl_drug_count: pro.tdl_drug_count,
          tdl_go_term_count: pro.tdl_go_term_count,
          tdl_generif_count: pro.tdl_generif_count,
          tdl_pm_score: pro.tdl_pm_score,
          tdl_antibody_count: pro.tdl_antibody_count
        }

output_adapters:
  - import: ./src/output_adapters/arango_output_adapter.py
    class: ArangoOutputAdapter
    kwargs:
      database_name: test_pharos
    credentials: *source_credentials
