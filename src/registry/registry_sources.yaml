sources:
  cure:
    datasets:
      case_reports:
        fetch:
          module: src.registry.sources.cure
          class: CureCaseReportsFetcher
          version_strategy: export_timestamp
      curated_concepts:
        fetch:
          module: src.registry.sources.cure
          class: ManualCureCuratedConceptsFetcher
          version_strategy: local_file_mtime
  ctd:
    datasets:
      curated_genes_diseases:
        fetch:
          module: src.registry.sources.ctd
          class: CtdCuratedGenesDiseasesFetcher
          version_strategy: ctd_report_created_header
  hcop:
    datasets:
      human_all_sixteen_column:
        fetch:
          module: src.registry.sources.hcop
          class: HcopHumanAllSixteenColumnFetcher
          version_strategy: single_file_last_modified
  impc:
    datasets:
      genotype_phenotype_assertions:
        fetch:
          module: src.registry.sources.impc
          class: ImpcGenotypePhenotypeAssertionsFetcher
          version_strategy: single_file_last_modified
  mgi:
    datasets:
      hmd_human_phenotype:
        fetch:
          module: src.registry.sources.mgi
          class: MgiHmdHumanPhenotypeFetcher
          version_strategy: single_file_last_modified
  mp:
    datasets:
      ontology:
        fetch:
          module: src.registry.sources.mp
          class: MpOntologyFetcher
          version_strategy: obo_data_version
  jensenlab:
    datasets:
      tissues:
        fetch:
          module: src.registry.sources.jensenlab
          class: JensenlabTissuesFetcher
          version_strategy: single_file_last_modified
      diseases:
        fetch:
          module: src.registry.sources.jensenlab
          class: JensenlabDiseasesFetcher
          version_strategy: multi_file_max_last_modified
      tinx:
        fetch:
          module: src.registry.sources.jensenlab
          class: JensenlabTinxFetcher
          version_strategy: multi_file_max_last_modified
      protein_counts:
        fetch:
          module: src.registry.sources.jensenlab
          class: JensenlabProteinCountsFetcher
          version_strategy: single_file_last_modified
  ncbi:
    datasets:
      publications:
        fetch:
          module: src.registry.sources.ncbi
          class: NcbiPublicationsFetcher
          version_strategy: multi_file_max_last_modified
      gene_summary:
        fetch:
          module: src.registry.sources.ncbi
          class: NcbiGeneSummaryFetcher
          version_strategy: single_file_last_modified
  pubtator:
    datasets:
      gene2pubtator3:
        fetch:
          module: src.registry.sources.pubtator
          class: PubtatorGene2Pubtator3Fetcher
          version_strategy: single_file_last_modified
  tiga:
    datasets:
      gene_trait:
        fetch:
          module: src.registry.sources.tiga
          class: TigaGeneTraitFetcher
          version_strategy: latest_release_directory_and_max_last_modified
  glygen:
    datasets:
      proteins:
        fetch:
          module: src.registry.sources.pharos_linkouts
          class: GlygenPharosLinkoutFetcher
          version_strategy: api_listcache_id
  dark_kinome:
    datasets:
      kinases:
        fetch:
          module: src.registry.sources.pharos_linkouts
          class: DarkKinomePharosLinkoutFetcher
          version_strategy: download_date
  resolute:
    datasets:
      genes:
        fetch:
          module: src.registry.sources.pharos_linkouts
          class: ResolutePharosLinkoutFetcher
          version_strategy: download_date
  linkedomics:
    datasets:
      genes:
        fetch:
          module: src.registry.sources.pharos_linkouts
          class: LinkedomicsPharosLinkoutFetcher
          version_strategy: download_date
  uberon:
    datasets:
      ontology:
        fetch:
          module: src.registry.sources.ontologies
          class: UberonOntologyFetcher
          version_strategy: single_file_last_modified
  go:
    datasets:
      ontology:
        fetch:
          module: src.registry.sources.ontologies
          class: GoBasicOntologyFetcher
          version_strategy: single_file_last_modified
      goa_human_go:
        fetch:
          module: src.registry.sources.ontologies
          class: GoaHumanGoFetcher
          version_strategy: single_file_last_modified
      goa_human_uniprot:
        fetch:
          module: src.registry.sources.ontologies
          class: EbiGoaHumanUniprotFetcher
          version_strategy: single_file_last_modified
  mondo:
    datasets:
      ontology:
        fetch:
          module: src.registry.sources.ontologies
          class: MondoOntologyFetcher
          version_strategy: single_file_last_modified
  disease_ontology:
    datasets:
      ontology:
        fetch:
          module: src.registry.sources.ontologies
          class: DiseaseOntologyFetcher
          version_strategy: owl_version_info
  chebi:
    datasets:
      ontology_full:
        fetch:
          module: src.registry.sources.ontologies
          class: ChebiFullOntologyFetcher
          version_strategy: chebi_release_and_obo_data_version
      three_star_sdf:
        fetch:
          module: src.registry.sources.metabolite_harmonization
          class: ChebiThreeStarSdfFetcher
          version_strategy: single_file_last_modified
  reactome:
    datasets:
      pathways:
        fetch:
          module: src.registry.sources.pathway_sources
          class: ReactomePathwaysFetcher
          version_strategy: reactome_database_version
  pathwaycommons:
    datasets:
      pc_hgnc:
        fetch:
          module: src.registry.sources.pathway_sources
          class: PathwaycommonsPathwaysFetcher
          version_strategy: pathwaycommons_datasources_txt
  panther:
    datasets:
      protein_classes:
        fetch:
          module: src.registry.sources.pathway_sources
          class: PantherClassesFetcher
          version_strategy: explicit_release_and_max_last_modified
  wikipathways:
    datasets:
      human_gmt:
        fetch:
          module: src.registry.sources.pathway_sources
          class: WikipathwaysHumanGmtFetcher
          version_strategy: filename_date
      rdf_wp:
        fetch:
          module: src.registry.sources.metabolite_harmonization
          class: WikipathwaysRdfWpFetcher
          version_strategy: wikipathways_rdf_filename_date
  iuphar:
    datasets:
      ligands_interactions:
        fetch:
          module: src.registry.sources.iuphar
          class: IupharLigandInteractionsFetcher
          version_strategy: multi_file_max_last_modified
  uniprot:
    datasets:
      human:
        fetch:
          module: src.registry.sources.uniprot
          class: UniprotHumanFetcher
          version_strategy: uniprot_release_headers
  bioplex:
    datasets:
      ppi:
        fetch:
          module: src.registry.sources.bioplex
          class: BioplexPpiFetcher
          version_strategy: explicit_release_and_max_last_modified
  string:
    datasets:
      protein_links_human:
        fetch:
          module: src.registry.sources.string
          class: StringHumanProteinLinksFetcher
          version_strategy: explicit_release_and_last_modified
  gtex:
    datasets:
      expression_v11:
        fetch:
          module: src.registry.sources.gtex
          class: GtexTissueExpressionFetcher
          version_strategy: explicit_gtex_v11_release
  hpa:
    datasets:
      tissue_expression:
        fetch:
          module: src.registry.sources.hpa
          class: HpaTissueExpressionFetcher
          version_strategy: hpa_download_page_version
  surechembl:
    datasets:
      patent_discovery:
        fetch:
          module: src.registry.sources.surechembl
          class: SurechemblPatentDiscoveryFetcher
          version_strategy: latest_dated_bulk_data_directory
      patent_family_mentions:
        derived:
          module: src.registry.derived.surechembl
          class: SurechemblPatentFamilyMentionsBuilder
          dependencies:
            - source: surechembl
              dataset: patent_discovery
          output:
            file_name: protein_patent_family_mentions.parquet
          transform:
            name: surechembl_patent_family_mentions
            version: 1
            code_ref: src/registry/derived/surechembl.py
  target_graph:
    datasets:
      gene_ids:
        fetch:
          module: src.registry.sources.manual_pharos
          class: ManualTargetGraphGeneIdsFetcher
          version_strategy: local_file_mtime
      transcript_ids:
        fetch:
          module: src.registry.sources.manual_pharos
          class: ManualTargetGraphTranscriptIdsFetcher
          version_strategy: local_file_mtime
      protein_ids:
        fetch:
          module: src.registry.sources.manual_pharos
          class: ManualTargetGraphProteinIdsFetcher
          version_strategy: local_file_mtime
      disease_ids:
        fetch:
          module: src.registry.sources.manual_pharos
          class: ManualTargetGraphDiseaseIdsFetcher
          version_strategy: local_file_mtime
      uniprot_mapping:
        fetch:
          module: src.registry.sources.manual_pharos
          class: ManualTargetGraphUniprotMappingFetcher
          version_strategy: local_file_mtime
      tdl_updates:
        fetch:
          module: src.registry.sources.manual_pharos
          class: ManualTdlUpdatesFetcher
          version_strategy: local_file_mtime
  hpm:
    datasets:
      protein_expression:
        fetch:
          module: src.registry.sources.manual_pharos
          class: ManualHpmProteinExpressionFetcher
          version_strategy: companion_version_file
  antibodypedia:
    datasets:
      scraped_results:
        fetch:
          module: src.registry.sources.manual_pharos
          class: ManualAntibodypediaScrapedResultsFetcher
          version_strategy: filename_timestamp
  ramp:
    datasets:
      sqlite_database:
        fetch:
          module: src.registry.sources.ramp
          class: RampSqliteDatabaseFetcher
          version_strategy: github_main_db_directory
  hmdb:
    datasets:
      metabolites_xml:
        fetch:
          module: src.registry.sources.metabolite_harmonization
          class: ManualHmdbMetabolitesXmlFetcher
          version_strategy: manual_hmdb_release
      structures_sdf:
        fetch:
          module: src.registry.sources.metabolite_harmonization
          class: ManualHmdbStructuresSdfFetcher
          version_strategy: manual_hmdb_release
  lipidmaps:
    datasets:
      lmsd_sdf:
        fetch:
          module: src.registry.sources.metabolite_harmonization
          class: LipidmapsLmsdSdfFetcher
          version_strategy: zip_inner_file_timestamp
  refmet:
    datasets:
      metabolites_csv:
        fetch:
          module: src.registry.sources.metabolite_harmonization
          class: RefmetMetabolitesCsvFetcher
          version_strategy: content_hash
  rdas:
    datasets:
      diseases_graphql:
        external:
          module: src.registry.sources.external_sources
          class: RdasDiseasesGraphqlExternalSource
          endpoint: https://rdas.ncats.nih.gov/api/diseases/graphql
          version: rdas-diseases-graphql
  chembl:
    datasets:
      activity_database:
        external:
          module: src.registry.sources.external_sources
          class: ChemblActivityDatabaseExternalSource
          credentials: src/use_cases/secrets/chembl_credentials.yaml
  drugcentral:
    datasets:
      drug_database:
        external:
          module: src.registry.sources.external_sources
          class: DrugcentralDrugDatabaseExternalSource
          credentials: src/use_cases/secrets/drugcentral_credentials.yaml
  ifx_pubmed:
    datasets:
      pubmed_mirror:
        external:
          module: src.registry.sources.external_sources
          class: IfxPubmedMirrorExternalSource
          credentials: src/use_cases/secrets/ifx_pubmed_credentials.yaml
  legacy_pharos:
    datasets:
      pharos319_mysql:
        external:
          module: src.registry.sources.external_sources
          class: LegacyPharosMysqlExternalSource
          credentials: src/use_cases/secrets/pharos_credentials.yaml
