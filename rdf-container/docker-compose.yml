services:
  fuseki:
    image: secoresearch/fuseki:5.5.0
    container_name: ifx_fuseki
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:?set FUSEKI_ADMIN_PASSWORD in rdf-container/.env}
      ENABLE_DATA_WRITE: "false"
      ENABLE_UPDATE: "false"
      QUERY_TIMEOUT: "10000,60000"
      TDB: "true"
    volumes:
      - ./databases:/fuseki-base/databases
      - ./configuration:/fuseki-base/configuration
    restart: unless-stopped
